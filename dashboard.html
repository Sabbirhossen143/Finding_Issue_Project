<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<link rel="shortcut icon" href="assets/github-logo.png">

<!-- Login protection -->
<script>
if(!localStorage.getItem("isLoggedIn")){
window.location.href="index.html";
}
</script>

<!-- Font awasome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 

    <!-- Tailwind font and DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- Fonts Link -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
      
  <!-- CSS Link  -->
    <link rel="stylesheet" href="style.css">

</head>


<body class="bg-gray-100 min-h-screen">

<!-- ================= NAVBAR ================= -->

<nav class="bg-white shadow-sm px-4 md:px-10 py-4 flex flex-col gap-5 items-center md:flex-row md:justify-between">

<div class="flex items-center gap-3">
<img src="assets/github-logo.png" class="w-8">
<h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>
</div>

<div class="flex items-center gap-3">

<input id="searchInput"
type="text"
placeholder="🔍︎ Search issues..."
class="input input-bordered w-full md:w-64"
onkeyup="searchIssue()">

<button class="btn btn-primary">
+ New Issue
</button>

</div>

</nav>


<!-- ================= TABS ================= -->

<div class="mx-auto bg-white shadow-sm rounded-lg py-4 px-4 md:px-6 mt-6 md:mt-14 max-w-[450px] md:max-w-[1350px]">

<div class="flex gap-3 flex-wrap">

<button onclick="setActive(this); loadIssues()" id="allBtn"
class="tab-btn px-10 h-[38px] font-semibold text-gray-500 border border-gray-300 rounded-md hover:bg-[#4A00FF] hover:text-white transition">
All
</button>

<button onclick="setActive(this); filterStatus('open')" id="openBtn"
class="tab-btn px-8 h-[38px] font-semibold text-gray-500 border border-gray-300 rounded-md hover:bg-[#4A00FF] hover:text-white transition">
Open
</button>

<button onclick="setActive(this); filterStatus('closed')" id="closedBtn"
class="tab-btn px-8 h-[38px] font-semibold text-gray-500 border border-gray-300 rounded-md hover:bg-[#4A00FF] hover:text-white transition">
Closed
</button>

</div>

</div>


<!-- ================= LOADER ================= -->

<div id="loader" class="text-center text-lg mt-10 hidden">
<span class="loading loading-spinner loading-xl"></span>
</div>



<!-- ================= ISSUES HEADER ================= -->

<div class="max-w-[450px] md:max-w-[1350px] mx-auto bg-white shadow-sm rounded-t-lg px-6 py-5 mt-6 flex justify-between items-center gap-3">

<!-- Left -->
<div class="flex items-center gap-4">

<div class="w-10 h-10 flex items-center justify-center rounded-full bg-purple-100 text-purple-600">
<img src="assets/Aperture.png">
</div>

<div>
<h2 class="text-lg font-semibold">
<span id="issueCount">0</span> Issues
</h2>

<p class="text-sm text-gray-500">
Track and manage your project issues
</p>
</div>

</div>

<!-- Right -->
<div class="flex items-center gap-3 md:gap-6 text-sm">

<div class="flex items-center gap-2">
<span class="w-3 h-3 bg-green-500 rounded-full"></span>
Open
</div>

<div class="flex items-center gap-2">
<span class="w-3 h-3 bg-purple-500 rounded-full"></span>
Closed
</div>

</div>

</div>



<!-- ================= ISSUES GRID ================= -->

<div class="max-w-[450px] md:max-w-[1350px] mx-auto pb-50 bg-[#FBFBFB] rounded-lg" >

<div id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 max-w-[400px] md:max-w-[1300px] mx-auto mt-0.5">

<!-- API cards will appear here -->

</div>
</div>



<!--  MODAL  -->

<div id="issueModal"
class="fixed inset-0 bg-black/30 bg-opacity-40 hidden flex items-center justify-center">

<div class="bg-white w-[500px] p-6 rounded-xl shadow-xl">

<div id="modalContent"></div>

<button onclick="closeModal()"
class="btn btn-primary mt-6 float-right">
Close
</button>

</div>

</div>



<script src="issues.js"></script>

</body>
</html>
