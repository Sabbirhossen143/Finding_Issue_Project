<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG IN | Git Hub</title>

    <!-- Tittle and Logo -->
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- Font awasome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 

    <!-- Tailwind font and DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- Fonts Link -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
      
  <!-- CSS Link  -->
    <link rel="stylesheet" href="style.css">


</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">

<div class="bg-white w-[520px] p-8 rounded-xl shadow-lg">

    <!-- Logo -->
    <div class="text-center">
        <img src="/assets/github-logo.png" class="w-20 mx-auto mb-4">
        <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
        <p class="text-gray-500">Sign in to manage your issues</p>
    </div>

    <!-- Username -->
    <div class="mt-6">
        <label class="block font-medium">Username</label>
        <input id="username" type="text" placeholder="Enter Username"
        class="input input-bordered w-full mt-2" required>

        <p class="text-blue-600 text-sm mt-1">Default: admin</p>
    </div>

    <!-- Password -->
    <div class="mt-4">
        <label class="block font-medium">Password</label>
        <input id="password"  type="password" placeholder="Enter Password"
        class="input input-bordered w-full mt-2" required>

        <p class="text-blue-600 text-sm mt-1">Default: admin123</p>
    </div>

    <!-- Button -->
    <button onclick="login()" class="btn btn-primary w-full mt-6 py-3 text-white rounded-lg
    hover:opacity-90 font-semibold">
        Sign In
    </button>

    <!-- OR Divider -->
    <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px bg-gray-300"></div>
        <span class="text-gray-800 text-sm">OR</span>
        <div class="flex-1 h-px bg-gray-300"></div>
    </div>

    <!-- Demo Credentials -->
     <p class="text-gray-500 text-sm mb-2 text-center">Demo Credentials:</p>

    <div class="bg-gray-100 p-4 rounded-lg text-center">        
        <p class="mt-3"><b>Username:</b> admin</p>
        <p><b>Password:</b> admin123</p>
    </div>

</div>

</body>

<script src="login.js"></script>

</body>

</body>
</html>
